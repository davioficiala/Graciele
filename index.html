<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Firebase</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#f5f5f5}

/* TOP */
.topbar{
display:flex;
align-items:center;
padding:12px;
background:#fff;
border-bottom:1px solid #ddd;
}

.menu-btn{
font-size:26px;
background:none;
border:none;
cursor:pointer;
}

/* OVERLAY MENU */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
}

.overlay.active{display:block}

/* MENU */
.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
color:#fff;
padding:20px;
transition:0.3s;
z-index:999;
}

.menu.active{left:0}

.menu a{
display:block;
color:#fff;
margin:15px 0;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:90%;
max-width:360px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.3s;
z-index:1000;
}

.modal.active{
transform:translate(-50%,-50%) scale(1);
}

.modal input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

.modal button{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.close{
text-align:right;
cursor:pointer;
margin-bottom:10px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<button class="menu-btn" onclick="openMenu()">☰</button>
<div style="margin-left:10px;font-weight:bold">Marketplace</div>
</div>

<!-- MENU OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="menu" id="menu">

<h3>MENU</h3>

<a onclick="openModal('usuario')">👤 Cadastro Usuário</a>
<a onclick="openModal('lojista')">🏪 Cadastro Lojista</a>

</div>

<!-- 👤 MODAL USUÁRIO -->
<div class="modal" id="modalUsuario">
<div class="close" onclick="closeModal()">✖</div>

<h3>Cadastro Usuário</h3>

<input id="u_nome" placeholder="Nome">
<input id="u_email" placeholder="Email">
<input id="u_tel" placeholder="Telefone">

<button onclick="salvarUsuario()">Salvar Usuário</button>
</div>

<!-- 🏪 MODAL LOJISTA -->
<div class="modal" id="modalLojista">
<div class="close" onclick="closeModal()">✖</div>

<h3>Cadastro Lojista</h3>

<input id="l_nome" placeholder="Nome">
<input id="l_empresa" placeholder="Empresa">
<input id="l_tel" placeholder="Telefone">
<input id="l_email" placeholder="Email">
<input id="l_endereco" placeholder="Endereço">

<button onclick="salvarLojista()">Salvar Lojista</button>
</div>

<script>

/* MENU */
function openMenu(){
menu.classList.add("active");
overlay.classList.add("active");
}

function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
}

/* ABRIR MODAL */
function openModal(type){

closeMenu();

if(type==="usuario"){
modalUsuario.classList.add("active");
}

if(type==="lojista"){
modalLojista.classList.add("active");
}
}

/* FECHAR MODAL */
function closeModal(){
modalUsuario.classList.remove("active");
modalLojista.classList.remove("active");
}

/* SALVAR USUÁRIO */
function salvarUsuario(){

const dados = {
nome:u_nome.value,
email:u_email.value,
telefone:u_tel.value
};

console.log("Usuário:",dados);

alert("Usuário salvo!");

u_nome.value="";
u_email.value="";
u_tel.value="";

closeModal(); // fecha automático
}

/* SALVAR LOJISTA */
function salvarLojista(){

const dados = {
nome:l_nome.value,
empresa:l_empresa.value,
telefone:l_tel.value,
email:l_email.value,
endereco:l_endereco.value
};

console.log("Lojista:",dados);

alert("Lojista salvo!");

l_nome.value="";
l_empresa.value="";
l_tel.value="";
l_email.value="";
l_endereco.value="";

closeModal(); // fecha automático
}

</script>

</body>
</html>
