
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Firebase</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<button class="menu-btn" onclick="openMenu()">☰</button>
<div>Marketplace</div>
</div>

<div class="menu" id="menu">

<a onclick="openModal('usuario')">Usuário</a>
<a onclick="openModal('lojista')">Lojista</a>
<a onclick="abrirProduto()">Produto</a>

</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- USUÁRIO -->
<div class="modal" id="modalUsuario">
<input id="u_nome" placeholder="Nome">
<input id="u_email" placeholder="Email">
<input id="u_tel" placeholder="Telefone">
<button onclick="salvarUsuario()">Salvar</button>
</div>

<!-- LOJISTA -->
<div class="modal" id="modalLojista">
<input id="l_nome" placeholder="Nome">
<input id="l_empresa" placeholder="Empresa">
<input id="l_tel" placeholder="Telefone">
<button onclick="salvarLojista()">Salvar</button>
</div>

<!-- PRODUTO -->
<div class="modal" id="modalProduto">
<select id="p_loja"></select>
<input id="p_nome" placeholder="Produto">
<input id="p_preco" placeholder="Preço">
<button onclick="salvarProduto()">Salvar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
